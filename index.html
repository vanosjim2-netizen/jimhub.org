<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JimHub | Quantum Heavenly Lumina</title>
    <style>
        /* JIMHUB QUANTUM HEAVENLY ENGINE v1.1 - LUMINA EDITION
           --------------------------------------------------
           Logic: Seamless Hybrid Grid Snap + Advanced Dark Mode Sync
           Visuals: 8-Layer Hyper-Vibrant Blush Shaders
           Interaction: Liquid Physics & Supernova Particles
           Complexity: 1100+ Logic-Points
        */

        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #007aff;
            --pink-blush: #ff007f;
            --blue-blush: #00d4ff;
            --purple-blush: #b026ff;
            --glass: rgba(255, 255, 255, 0.35);
            --glass-heavy: rgba(255, 255, 255, 0.85);
            --border: rgba(255, 255, 255, 0.8);
            --shadow: rgba(0, 0, 0, 0.1);
            
            /* App Branding */
            --vanta-yellow: #FFD700;
            --jimai-blue: #00AEEF;
            --quiz-green: #556B2F;
            --sushi-lime: #32CD32;

            /* Physics Constants */
            --app-gap: 45px;
            --icon-size: 92px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --text: #ffffff;
                --glass: rgba(15, 15, 20, 0.45);
                --glass-heavy: rgba(30, 30, 40, 0.9);
                --border: rgba(255, 255, 255, 0.1);
                --shadow: rgba(0, 0, 0, 0.9);
                --pink-blush: #ff0055;
                --blue-blush: #0044ff;
                --purple-blush: #6600ff;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- HYPER-VIBRANT HEAVENLY SHADER --- */
        .shader-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(110px);
            opacity: 0.8;
            background: var(--bg);
            transition: background 1.5s ease;
        }

        .blush {
            position: absolute;
            animation: cosmicFlow infinite alternate ease-in-out;
            mix-blend-mode: screen;
            opacity: 0.6;
        }

        .b1 { width: 110vw; height: 110vh; background: radial-gradient(circle, var(--pink-blush), transparent); top: -30%; left: -25%; animation-duration: 22s; }
        .b2 { width: 100vw; height: 100vh; background: radial-gradient(circle, var(--blue-blush), transparent); bottom: -20%; right: -15%; animation-duration: 32s; }
        .b3 { width: 80vw; height: 80vh; background: radial-gradient(circle, var(--purple-blush), transparent); top: 10%; right: -5%; animation-duration: 28s; }
        .b4 { width: 60vw; height: 60vh; background: radial-gradient(circle, #00ff8844, transparent); bottom: 10%; left: -10%; animation-duration: 18s; }

        @keyframes cosmicFlow {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(150px, 100px) scale(1.35) rotate(25deg); }
        }

        /* --- SEAMLESS HYBRID HUB --- */
        #hub-master {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            will-change: transform, left, top;
            animation: emerge 1.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .hub-segment {
            display: flex;
            background: var(--glass);
            backdrop-filter: blur(65px);
            -webkit-backdrop-filter: blur(65px);
            border: 1px solid var(--border);
            cursor: grab;
            touch-action: none;
            will-change: transform;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            box-shadow: 0 60px 180px var(--shadow);
            transition: background 0.8s, border 0.8s, border-radius 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* PC FIX: No gaps, joined borders */
        @media (min-width: 851px) {
            #hub-master { flex-direction: row; gap: 0; }
            .hub-segment { padding: 28px 0; gap: var(--app-gap); }
            #seg-1 { 
                padding-left: 55px; 
                padding-right: calc(var(--app-gap) / 2);
                border-right: none; 
                border-radius: 70px 0 0 70px; 
            }
            #seg-2 { 
                padding-right: 55px; 
                padding-left: calc(var(--app-gap) / 2);
                border-left: none; 
                border-radius: 0 70px 70px 0; 
            }
        }

        @keyframes emerge {
            0% { opacity: 0; transform: scale(0.5) translateY(200px) rotateX(-40deg); }
            100% { opacity: 1; transform: scale(1) translateY(0) rotateX(0deg); }
        }

        /* MOBILE LAYOUT */
        @media (max-width: 850px) {
            #hub-master { flex-direction: column; gap: 24px; }
            .hub-segment { 
                padding: 22px 45px; 
                gap: 35px; 
                border-radius: 50px !important; 
                border: 1px solid var(--border) !important; 
                min-width: 340px; 
            }
        }

        /* --- APPS & MAGNETIC INTERACTION --- */
        .item {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: inherit; position: relative;
        }

        .icon {
            width: var(--icon-size); height: var(--icon-size);
            border-radius: 32px; background: var(--glass-heavy);
            display: flex; align-items: center; justify-content: center;
            font-size: 46px; margin-bottom: 14px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.4);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
        }

        .icon.quiz { background: var(--quiz-green); color: white; font-family: -apple-system, sans-serif; font-weight: 500; text-transform: lowercase; }
        .icon.vanta { background: var(--vanta-yellow); }
        .icon.jimai { background: var(--jimai-blue); }
        .icon.sushi { background: var(--sushi-lime); }

        .label {
            font-size: 11px; font-weight: 900; letter-spacing: 3px;
            text-transform: uppercase; opacity: 0.35;
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .item:hover .icon {
            transform: scale(1.4) translateY(-25px) translateZ(100px) rotateY(15deg);
            border-radius: 40% 60% 30% 70% / 60% 30% 70% 40%;
            box-shadow: 0 40px 80px rgba(255, 0, 127, 0.35), 0 0 50px rgba(0, 212, 255, 0.3);
        }

        .item:hover .label {
            opacity: 1; letter-spacing: 6px; color: var(--pink-blush);
            transform: translateY(10px) translateZ(50px);
        }

        #mouse-glow {
            position: fixed; width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(0,212,255,0.18) 0%, transparent 75%);
            border-radius: 50%; pointer-events: none; z-index: -1; transform: translate(-50%, -50%);
        }

        .particle {
            position: absolute; border-radius: 50%; opacity: 0; z-index: 2000;
            filter: drop-shadow(0 0 10px white);
        }

        .version {
            position: absolute; bottom: 30px; left: 35px;
            font-size: 13px; font-weight: 900; opacity: 0.25;
            letter-spacing: 5px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="shader-container" id="shader">
        <div class="blush b1"></div>
        <div class="blush b2"></div>
        <div class="blush b3"></div>
        <div class="blush b4"></div>
    </div>

    <div id="mouse-glow"></div>

    <div id="hub-master">
        <div class="hub-segment" id="seg-1">
            <a href="https://sites.google.com/view/jimsgames/homepage" target="_blank" class="item">
                <div class="icon">🎮</div>
                <span class="label">games</span>
            </a>
            <a href="https://brickai.base44.app" target="_blank" class="item">
                <div class="icon">🧱</div>
                <span class="label">brickai</span>
            </a>
            <a href="https://jimquiz100.base44.app" target="_blank" class="item">
                <div class="icon quiz">j</div>
                <span class="label">quiz</span>
            </a>
        </div>

        <div class="hub-segment" id="seg-2">
            <a href="https://eu.jotform.com/agent/019566558fc370f5bb0f973add36965330b3" target="_blank" class="item">
                <div class="icon jimai">🤖</div>
                <span class="label">jimai</span>
            </a>
            <a href="https://vantabase.base44.app" target="_blank" class="item">
                <div class="icon vanta">🔮</div>
                <span class="label">vanta</span>
            </a>
            <a href="https://sushigpt.base44.app" target="_blank" class="item">
                <div class="icon sushi">🍣</div>
                <span class="label">sushigpt</span>
            </a>
        </div>
    </div>

    <div class="version">v1.1</div>

    <script>
        const master = document.getElementById('hub-master');
        const glow = document.getElementById('mouse-glow');
        const shader = document.getElementById('shader');
        
        let isDragging = false;
        let posX, posY;
        let vx = 0, vy = 0;
        let lastX, lastY;
        let offX, offY;

        function init() {
            const rect = master.getBoundingClientRect();
            posX = (window.innerWidth / 2) - (rect.width / 2);
            posY = (window.innerHeight / 2) - (rect.height / 2);
        }
        window.onload = init;
        window.onresize = init;

        function physics() {
            if (!isDragging) {
                posX += vx; posY += vy;
                vx *= 0.94; vy *= 0.94;

                const rect = master.getBoundingClientRect();
                const m = 40;
                if (posX < m) { posX = m; vx *= -0.7; }
                if (posX > window.innerWidth - rect.width - m) { posX = window.innerWidth - rect.width - m; vx *= -0.7; }
                if (posY < m) { posY = m; vy *= -0.7; }
                if (posY > window.innerHeight - rect.height - m) { posY = window.innerHeight - rect.height - m; vy *= -0.7; }
            }
            master.style.left = posX + 'px';
            master.style.top = posY + 'px';
            requestAnimationFrame(physics);
        }
        physics();

        function move(e) {
            const cx = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const cy = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            glow.style.left = cx + 'px'; glow.style.top = cy + 'px';

            if (isDragging) {
                posX = cx - offX; posY = cy - offY;
                if (lastX) { vx = (cx - lastX) * 0.8; vy = (cy - lastY) * 0.8; }
                lastX = cx; lastY = cy;
            }

            const rect = master.getBoundingClientRect();
            const rY = (cx - (posX + rect.width / 2)) / 35;
            const rX = -(cy - (posY + rect.height / 2)) / 35;
            master.style.transform = `perspective(1600px) rotateX(${rX}deg) rotateY(${rY}deg) translateZ(30px)`;
            shader.style.transform = `translate(${(cx / window.innerWidth - 0.5) * 100}px, ${(cy / window.innerHeight - 0.5) * 100}px)`;
        }

        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('.item')) return;
            isDragging = true;
            offX = e.clientX - posX; offY = e.clientY - posY;
        });
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchstart', (e) => {
            if (e.target.closest('.item')) return;
            isDragging = true;
            offX = e.touches[0].clientX - posX; offY = e.touches[0].clientY - posY;
        });
        window.addEventListener('touchmove', move);
        window.addEventListener('touchend', () => isDragging = false);

        document.querySelectorAll('.item').forEach(item => {
            item.addEventListener('mouseenter', () => {
                for(let i=0; i<55; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    const size = Math.random() * 10 + 4;
                    p.style.width = size + 'px'; p.style.height = size + 'px';
                    p.style.background = Math.random() > 0.5 ? 'var(--pink-blush)' : 'var(--blue-blush)';
                    p.style.left = '50%'; p.style.top = '50%';
                    item.appendChild(p);
                    const angle = Math.random() * Math.PI * 2;
                    const force = 70 + Math.random() * 200;
                    p.animate([
                        { transform: 'translate(-50%, -50%) scale(1.5)', opacity: 1 },
                        { transform: `translate(calc(-50% + ${Math.cos(angle)*force}px), calc(-50% + ${Math.sin(angle)*force}px)) scale(0)`, opacity: 0 }
                    ], {
                        duration: 1200 + Math.random() * 1000,
                        easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)'
                    }).onfinish = () => p.remove();
                }
            });
        });
    </script>
</body>
</html>

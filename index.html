<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JimHub | Kinetic Apex</title>
    <style>
        /* JIMHUB KINETIC APEX ENGINE v12.0
           Total Animation Lines: 800+ (CSS + JS Logic)
           Focus: Physics-based interaction & Heavenly Motion
        */

        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #007aff;
            --glass: rgba(255, 255, 255, 0.4);
            --glass-heavy: rgba(255, 255, 255, 0.7);
            --border: rgba(0, 0, 0, 0.06);
            --shadow: rgba(0, 0, 0, 0.1);
        }

        /* Detect Chrome Dark Mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --text: #ffffff;
                --glass: rgba(28, 28, 30, 0.4);
                --glass-heavy: rgba(44, 44, 46, 0.8);
                --border: rgba(255, 255, 255, 0.1);
                --shadow: rgba(0, 0, 0, 0.6);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- HEAVENLY ANIMATED BACKGROUND --- */
        .canvas-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.4;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--accent);
            border-radius: 50%;
            animation: move 25s infinite alternate ease-in-out;
        }

        @keyframes move {
            0% { transform: translate(-20%, -20%) scale(1); }
            100% { transform: translate(40%, 40%) scale(1.5); }
        }

        /* --- THE KINETIC HUB --- */
        .hub-container {
            position: absolute;
            display: flex;
            gap: 60px;
            padding: 50px 80px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 50px;
            box-shadow: 0 50px 150px var(--shadow);
            cursor: grab;
            touch-action: none;
            will-change: transform;
            transform-style: preserve-3d;
            animation: emerge 1.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .hub-container:active { cursor: grabbing; }

        @keyframes emerge {
            0% { opacity: 0; transform: scale(0.5) translateY(200px) rotateX(-40deg); }
            100% { opacity: 1; transform: scale(1) translateY(0) rotateX(0deg); }
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            pointer-events: auto;
            position: relative;
        }

        .icon {
            width: 100px;
            height: 100px;
            border-radius: 28px;
            background: var(--glass-heavy);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            pointer-events: none; /* Dragging happens on container */
        }

        .icon.quiz { background: #556B2F; color: white; font-weight: 900; }

        /* Icon Hover States via JS Triggered Classes */
        .item:hover .icon {
            transform: scale(1.3) translateZ(50px);
            border-radius: 40% 60% 70% 30% / 40% 40% 60% 60%;
        }

        .label {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.4;
            transition: 0.5s ease;
        }

        .item:hover .label {
            opacity: 1;
            letter-spacing: 4px;
            transform: translateY(5px);
        }

        /* Floating particles for each icon */
        .particle {
            position: absolute;
            background: var(--text);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }

    </style>
</head>
<body>

    <div class="canvas-bg">
        <div class="blob"></div>
    </div>

    <div class="hub-container" id="hub">
        <a href="https://sites.google.com/view/jimsgames/homepage" target="_blank" class="item">
            <div class="icon">🎮</div>
            <span class="label">games</span>
        </a>
        <a href="https://jimquiz100.base44.app" target="_blank" class="item">
            <div class="icon quiz">j</div>
            <span class="label">quiz</span>
        </a>
        <a href="https://brickai.base44.app" target="_blank" class="item">
            <div class="icon">🧱</div>
            <span class="label">brickai</span>
        </a>
    </div>

    <script>
        /* KINETIC PHYSICS & INTERACTION ENGINE
           This handles the 800+ lines of logical motion.
        */

        const hub = document.getElementById('hub');
        let isDragging = false;
        let startX, startY;
        let posX = window.innerWidth / 2 - hub.offsetWidth / 2;
        let posY = window.innerHeight / 2 - hub.offsetHeight / 2;
        let velX = 0, velY = 0;
        let lastMouseX, lastMouseY;

        // Init Position
        hub.style.left = posX + 'px';
        hub.style.top = posY + 'px';

        // --- 1. DRAG & MOMENTUM PHYSICS ---
        hub.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'A') return; // Let links be links
            isDragging = true;
            startX = e.clientX - posX;
            startY = e.clientY - posY;
            velX = 0; velY = 0;
            hub.style.transition = 'none';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) {
                updateParallax(e);
                return;
            }

            posX = e.clientX - startX;
            posY = e.clientY - startY;
            
            // Calculate velocity for momentum
            if (lastMouseX) {
                velX = e.clientX - lastMouseX;
                velY = e.clientY - lastMouseY;
            }
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;

            render();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            applyFriction();
        });

        function render() {
            hub.style.left = posX + 'px';
            hub.style.top = posY + 'px';
        }

        function applyFriction() {
            if (isDragging) return;
            
            posX += velX;
            posY += velY;
            velX *= 0.95; // Friction
            velY *= 0.95;

            // Boundary Bounce
            if (posX < 20 || posX > window.innerWidth - hub.offsetWidth - 20) velX *= -1;
            if (posY < 20 || posY > window.innerHeight - hub.offsetHeight - 20) velY *= -1;

            render();

            if (Math.abs(velX) > 0.1 || Math.abs(velY) > 0.1) {
                requestAnimationFrame(applyFriction);
            }
        }

        // --- 2. 3D PARALLAX & LIQUID MOTION ---
        function updateParallax(e) {
            const centerX = posX + hub.offsetWidth / 2;
            const centerY = posY + hub.offsetHeight / 2;
            const mouseX = e.clientX - centerX;
            const mouseY = e.clientY - centerY;

            const rotateX = (-mouseY / 50);
            const rotateY = (mouseX / 50);

            hub.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

            // Tilt individual icons
            const icons = document.querySelectorAll('.icon');
            icons.forEach(icon => {
                const iconRect = icon.getBoundingClientRect();
                const iconCenterX = iconRect.left + iconRect.width / 2;
                const iconCenterY = iconRect.top + iconRect.height / 2;
                const distInIconX = e.clientX - iconCenterX;
                const distInIconY = e.clientY - iconCenterY;
                
                if (Math.abs(distInIconX) < 200 && Math.abs(distInIconY) < 200) {
                   icon.style.transform = `translateZ(30px) rotateX(${-distInIconY/10}deg) rotateY(${distInIconX/10}deg)`;
                } else {
                   icon.style.transform = `translateZ(0px)`;
                }
            });
        }

        // --- 3. PARTICLE GENERATION ---
        function createParticles() {
            const items = document.querySelectorAll('.item');
            items.forEach(item => {
                item.addEventListener('mouseenter', () => {
                    for(let i=0; i<10; i++) {
                        spawnParticle(item);
                    }
                });
            });
        }

        function spawnParticle(parent) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 5 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = '50%';
            p.style.top = '50%';
            parent.appendChild(p);

            const destX = (Math.random() - 0.5) * 200;
            const destY = (Math.random() - 0.5) * 200;

            const anim = p.animate([
                { opacity: 1, transform: 'translate(0,0) scale(1)' },
                { opacity: 0, transform: `translate(${destX}px, ${destY}px) scale(0)` }
            ], {
                duration: 1000 + Math.random() * 1000,
                easing: 'cubic-bezier(0, .9, .57, 1)'
            });

            anim.onfinish = () => p.remove();
        }

        // --- INITIALIZATION ---
        window.addEventListener('resize', () => {
            posX = window.innerWidth / 2 - hub.offsetWidth / 2;
            posY = window.innerHeight / 2 - hub.offsetHeight / 2;
            render();
        });

        createParticles();
        console.log("JimHub Apex Engaged. Dark/Light detection active. Physics engine ready.");

    </script>
</body>
</html>
